name: Fetch Ops Data

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch Jira + PagerDuty data
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          PD_API_TOKEN: ${{ secrets.PD_API_TOKEN }}
          PD_SCHEDULE_ID: ${{ secrets.PD_SCHEDULE_ID }}
          PD_ESCALATION_POLICY_ID: PUY50K9
        run: |
          python3 - <<'EOF'
          import json, os, urllib.request, urllib.parse, base64, datetime

          JIRA_BASE  = os.environ['JIRA_BASE_URL']
          JIRA_EMAIL = os.environ['JIRA_EMAIL']
          JIRA_TOKEN = os.environ['JIRA_API_TOKEN']
          PD_TOKEN   = os.environ['PD_API_TOKEN']
          PD_SCHED   = os.environ['PD_SCHEDULE_ID']
          PD_EP_ID   = os.environ['PD_ESCALATION_POLICY_ID']

          now   = datetime.datetime.now(datetime.timezone.utc).replace(tzinfo=None)
          today = now.strftime('%Y-%m-%d')

          jira_creds   = base64.b64encode(f"{JIRA_EMAIL}:{JIRA_TOKEN}".encode()).decode()
          jira_headers = {'Authorization': f'Basic {jira_creds}', 'Content-Type': 'application/json', 'Accept': 'application/json'}

          def jira_count(jql):
            url     = f"{JIRA_BASE}/rest/api/3/search/approximate-count"
            payload = json.dumps({"jql": jql}).encode()
            req     = urllib.request.Request(url, data=payload, headers=jira_headers, method='POST')
            with urllib.request.urlopen(req) as r:
              return json.loads(r.read()).get('count', 0)

          window_start = (now - datetime.timedelta(days=1)).strftime('%Y-%m-%d')
          window_end   = now.strftime('%Y-%m-%d')

          currently_open = jira_count('project = RTS AND status != Done')
          p1             = jira_count('project = RTS AND priority in (Blocker, ASAP) AND status != Done')
          p2             = jira_count('project = RTS AND priority = High AND status != Done')
          open_problems  = jira_count('project = RTS AND issuetype = Problem AND status != Done')
          on_call_tickets= jira_count('project = RTS AND status != Done AND labels = on-call')
          opened_day     = jira_count(f'project = RTS AND created >= "{window_start}" AND created < "{window_end}"')
          closed_day     = jira_count(f'project = RTS AND resolutiondate >= "{window_start}" AND resolutiondate < "{window_end}"')

          print(f"Window: {window_start} -> {window_end}")
          print(f"open={currently_open} opened={opened_day} closed={closed_day}")

          trend = []
          for i in range(6, -1, -1):
            day_start = (now - datetime.timedelta(days=i)).replace(hour=0,minute=0,second=0)
            is_today  = (i == 0)
            trend.append({
              'date': day_start.strftime('%-d-%b'), 'is_today': is_today,
              'currently_open': currently_open if is_today else 0,
              'opened':         opened_day     if is_today else 0,
              'closed':         closed_day     if is_today else 0,
              'on_call':        on_call_tickets if is_today else 0,
            })

          pd_headers = {'Authorization': f'Token token={PD_TOKEN}', 'Content-Type': 'application/json', 'Accept': 'application/vnd.pagerduty+json;version=2'}

          def pd_get(path):
            req = urllib.request.Request(f'https://api.pagerduty.com{path}', headers=pd_headers)
            with urllib.request.urlopen(req) as r:
              return json.loads(r.read())

          # Current on-call L1 from the schedule
          oncall_resp  = pd_get(f'/oncalls?schedule_ids[]={PD_SCHED}&include[]=users&escalatio
