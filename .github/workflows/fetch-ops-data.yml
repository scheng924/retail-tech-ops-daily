name: Fetch Ops Data

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 minutes
  workflow_dispatch:          # allow manual trigger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # needed to push data.json back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch Jira + PagerDuty data
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}         # e.g. https://arcteryx.atlassian.net
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_JSM_PROJECT: ${{ secrets.JIRA_JSM_PROJECT }}   # e.g. RTECH
          JIRA_SW_PROJECT: ${{ secrets.JIRA_SW_PROJECT }}     # e.g. RTDEV
          PD_API_TOKEN: ${{ secrets.PD_API_TOKEN }}
          PD_SCHEDULE_ID: ${{ secrets.PD_SCHEDULE_ID }}       # PagerDuty schedule UUID
        run: |
          python3 - <<'EOF'
          import json, os, urllib.request, urllib.parse, base64, datetime

          JIRA_BASE   = os.environ['JIRA_BASE_URL']
          JIRA_EMAIL  = os.environ['JIRA_EMAIL']
          JIRA_TOKEN  = os.environ['JIRA_API_TOKEN']
          JSM_PROJ    = 'RTS'  # hardcoded project key
          SW_PROJ     = os.environ['JIRA_SW_PROJECT']
          PD_TOKEN    = os.environ['PD_API_TOKEN']
          PD_SCHED    = os.environ['PD_SCHEDULE_ID']

          now = datetime.datetime.now(datetime.timezone.utc).replace(tzinfo=None)

          # ── Jira helpers ──────────────────────────────────────────────────────
          jira_creds = base64.b64encode(f"{JIRA_EMAIL}:{JIRA_TOKEN}".encode()).decode()
          jira_headers = {
            'Authorization': f'Basic {jira_creds}',
            'Content-Type': 'application/json'
          }

          def jira_search(jql):
            # POST to search endpoint — more reliable across Atlassian Cloud instances
            url = f"{JIRA_BASE}/rest/api/3/search"
            payload = json.dumps({"jql": jql, "maxResults": 0, "fields": ["id"]}).encode()
            req = urllib.request.Request(url, data=payload, headers={**jira_headers, 'Content-Type': 'application/json'}, method='POST')
            with urllib.request.urlopen(req) as r:
              return json.loads(r.read())['total']

          # ── Jira metrics ──────────────────────────────────────────────────────
          ago_24h = (now - datetime.timedelta(hours=24)).strftime('%Y-%m-%dT%H:%M:%SZ')
          currently_open  = jira_search(f'project = {JSM_PROJ} AND status != Done')
          p1              = jira_search(f'project = RTS AND priority in (Blocker, ASAP) AND status != Done')
          p2              = jira_search(f'project = RTS AND priority = High AND status != Done')
          open_problems   = jira_search(f'project = {JSM_PROJ} AND issuetype = Problem AND status != Done')
          opened_24h      = jira_search(f'project = {JSM_PROJ} AND created >= "{ago_24h}"')
          closed_24h      = jira_search(f'project = {JSM_PROJ} AND resolutiondate >= "{ago_24h}"')
          on_call_tickets = jira_search(f'project = {JSM_PROJ} AND status != Done AND labels = on-call')

          # ── 7-day trend ───────────────────────────────────────────────────────
          trend = []
          for i in range(6, -1, -1):
            day_start = (now - datetime.timedelta(days=i)).replace(hour=0,minute=0,second=0)
            day_end   = day_start + datetime.timedelta(days=1)
            ds = day_start.strftime('%Y-%m-%dT%H:%M:%SZ')
            de = day_end.strftime('%Y-%m-%dT%H:%M:%SZ')
            label = day_start.strftime('%-d-%b')
            trend.append({
              'date': label,
              'is_today': i == 0,
              'currently_open': jira_search(f'project = {JSM_PROJ} AND status != Done AND created <= "{de}"'),
              'opened': jira_search(f'project = {JSM_PROJ} AND created >= "{ds}" AND created <= "{de}"'),
              'closed': jira_search(f'project = {JSM_PROJ} AND resolutiondate >= "{ds}" AND resolutiondate <= "{de}"'),
              'on_call': jira_search(f'project = {JSM_PROJ} AND labels = on-call AND created >= "{ds}" AND created <= "{de}"'),
            })

          # ── PagerDuty ─────────────────────────────────────────────────────────
          pd_headers = {
            'Authorization': f'Token token={PD_TOKEN}',
            'Content-Type': 'application/json',
            'Accept': 'application/vnd.pagerduty+json;version=2'
          }

          def pd_get(path):
            req = urllib.request.Request(f'https://api.pagerduty.com{path}', headers=pd_headers)
            with urllib.request.urlopen(req) as r:
              return json.loads(r.read())

          oncall_resp = pd_get(f'/oncalls?schedule_ids[]={PD_SCHED}&include[]=users&escalation_policy_step_number=1')
          oncalls = oncall_resp.get('oncalls', [])
          current_user = oncalls[0]['user'] if oncalls else {'name': 'Unknown'}

          esc_resp = pd_get(f'/oncalls?schedule_ids[]={PD_SCHED}&include[]=users&escalation_policy_step_number=2')
          esc_oncalls = esc_resp.get('oncalls', [])
          esc_user = esc_oncalls[0]['user'] if esc_oncalls else {'name': 'Unknown'}

          week_start = now.strftime('%Y-%m-%dT00:00:00Z')
          week_end   = (now + datetime.timedelta(days=6)).strftime('%Y-%m-%dT23:59:59Z')
          week_sched = pd_get(f'/oncalls?schedule_ids[]={PD_SCHED}&since={week_start}&until={week_end}&include[]=users')
          week_schedule = []
          days_added = set()
          for entry in week_sched.get('oncalls', []):
            start = datetime.datetime.strptime(entry['start'][:10], '%Y-%m-%d')
            day_str = start.strftime('%a')
            if day_str not in days_added:
              days_added.add(day_str)
              week_schedule.append({
                'day': day_str,
                'date': start.strftime('%-d'),
                'name': entry['user']['name'],
                'level': 'L1',
                'is_today': start.date() == now.date()
              })

          def initials(name):
            parts = name.split()
            return (parts[0][0] + parts[-1][0]).upper() if len(parts) >= 2 else name[:2].upper()

          output = {
            'fetched_at': now.strftime('%Y-%m-%dT%H:%M:%SZ'),
            'jira': {
              'currently_open': currently_open,
              'p1': p1,
              'p2': p2,
              'open_problems': open_problems,
              'trend': trend
            },
            
            'pagerduty': {
              'current_oncall': {
                'name': current_user['name'],
                'initials': initials(current_user['name']),
                'level': 'L1 Primary',
                'since': now.strftime('%Y-%m-%dT00:00:00Z')
              },
              'escalation': {
                'name': esc_user['name'],
                'initials': initials(esc_user['name']),
                'level': 'L2 Escalation'
              },
              'week_schedule': week_schedule
            }
          }

          with open('data.json', 'w') as f:
            json.dump(output, f, indent=2)

          print(f"data.json written — open: {currently_open}, P1: {p1}, P2: {p2}, on-call: {current_user['name']}")
          EOF

      - name: Commit data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "chore: refresh ops data $(date -u +%H:%M)"
          git push