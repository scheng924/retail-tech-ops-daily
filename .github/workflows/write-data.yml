name: Write Data

on:
  workflow_dispatch:
    inputs:
      file_path:
        description: 'File to write'
        required: true
      content:
        description: 'Base64-encoded JSON content'
        required: true
      commit_message:
        description: 'Commit message'
        required: true
        default: 'chore: update data file'

jobs:
  write:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write and commit file
        run: |
          echo "${{ github.event.inputs.content }}" | base64 -d > "${{ github.event.inputs.file_path }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ github.event.inputs.file_path }}"
          git diff --cached --quiet && echo "No changes" || (git commit -m "${{ github.event.inputs.commit_message }}" && git push)
